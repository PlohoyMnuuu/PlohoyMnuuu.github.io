name: Update Promocodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install axios
      
      - name: Create generate.js
        run: |
          cat > generate.js << 'EOF'
          const axios = require('axios');
          const fs = require('fs');
          
          const SHEET_ID = '1g7Whf8a1pSCJrDKv0hML0L8_8vnVR4lFdobCsRly36k';
          const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
          
          async function fetchPromoCodes() {
              try {
                  console.log('🔄 Загружаю данные...');
                  const response = await axios.get(SHEET_URL);
                  const lines = response.data.split('\n');
                  const codes = [];
                  
                  for (let i = 0; i < lines.length; i++) {
                      const line = lines[i].trim();
                      if (!line) continue;
                      
                      const columns = line.split(',');
                      if (columns.length < 1) continue;
                      
                      let code = columns[0].trim().replace(/^"|"$/g, '');
                      let reward = columns.length > 1 ? columns[1].trim().replace(/^"|"$/g, '') : 'Бонус';
                      
                      if (code && code.length >= 2) {
                          codes.push({ code, reward });
                      }
                  }
                  
                  console.log(`✅ Найдено ${codes.length} кодов`);
                  return codes;
              } catch (error) {
                  console.error('❌ Ошибка:', error.message);
                  return [];
              }
          }
          
          async function generateHTML(codes) {
              let template = fs.readFileSync('template.html', 'utf8');
              
              let promoHTML = '';
              const total = codes.length;
              
              if (total === 0) {
                  promoHTML = '<div class="promo-card"><div class="promo-info"><span class="reward-text">Промокоды временно отсутствуют, скоро добавлю новые!</span></div></div>';
              } else {
                  codes.forEach((item, i) => {
                      const isNew = (i < 3) ? '<span class="new-badge">Новое</span>' : '';
                      const safeCode = item.code.replace(/'/g, "\\'");
                      
                      promoHTML += `<div class="promo-card" onclick="copy('${safeCode}')" role="button" tabindex="0">
                          <div class="promo-info">
                              <div class="code-header">
                                  <span class="code-text">${item.code}</span>
                                  ${isNew}
                              </div>
                              <span class="reward-text">${item.reward}</span>
                          </div>
                          <div class="copy-btn">
                              <svg fill="none" viewBox="0 0 24 24" width="14" height="14"><rect height="16" rx="2" stroke="#000" stroke-width="2" width="12" x="8" y="2"/><path d="M4 6V20H16" stroke="#000" stroke-linecap="round" stroke-width="2"/></svg>
                              Копировать
                          </div>
                      </div>`;
                  });
              }
              
              template = template.replace(/<div id="promo-list">[\s\S]*?<\/div>/, `<div id="promo-list">${promoHTML}</div>`);
              template = template.replace(/<span id="promo-count">\d+<\/span>/, `<span id="promo-count">${total}</span>`);
              
              const today = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
              template = template.replace(/<span id="stats-update-date">[\s\S]*?<\/span>/, `<span id="stats-update-date"><svg fill="none" viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#ffffff;opacity:0.5;"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 6V12L16 14" stroke-linecap="round" stroke-width="2"/></svg> <span>Обновлено:</span> ${today}</span>`);
              
              fs.writeFileSync('index.html', template, 'utf8');
              console.log(`✅ Сгенерировано ${total} кодов`);
          }
          
          async function main() {
              const codes = await fetchPromoCodes();
              await generateHTML(codes);
          }
          
          main();
          EOF
      
      - name: Download template.html
        run: |
          curl -o template.html https://raw.githubusercontent.com/PloHoyMnuuu/PloHoyMnuuu.github.io/main/template.html
      
      - name: Run generator
        run: node generate.js
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update promocodes from Google Sheets"
            git push
          fi
